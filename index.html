<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20260627 Hans & Catherine 照片影片上傳區</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-pink-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl shadow-xl max-w-sm w-full text-center">
        <h1 class="text-2xl font-bold text-pink-600 mb-4">📷 20260627<br>Hans & Catherine</h1>
        <p class="text-gray-600 mb-6">請分享您的婚禮照片或影片<br>(可多選)</p>
        
        <input type="file" id="fileInput" accept="image/*,video/*" multiple class="block w-full text-sm text-gray-500 mb-6 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-pink-100 file:text-pink-700 hover:file:bg-pink-200">
        
        <button onclick="uploadFiles()" id="uploadBtn" class="w-full bg-pink-600 text-white py-3 rounded-xl font-semibold hover:bg-pink-700 transition">立即上傳</button>
        
        <p id="status" class="mt-4 text-sm text-gray-500"></p>
    </div>

    <script>
        async function uploadFiles() {
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('status');
            const uploadBtn = document.getElementById('uploadBtn');
            const files = fileInput.files;
            
            if (files.length === 0) { alert("請先選擇照片或影片"); return; }
            
            uploadBtn.disabled = true;
            let successCount = 0;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                status.textContent = `正在上傳 ${i + 1}/${files.length} (${file.name}) ...`;
                
                try {
                    const base64Data = await getBase64(file);
                    
                    // 針對影片增加較長的逾時等待時間 (300秒)
                    const response = await fetch("https://script.google.com/macros/s/AKfycbyCM0_UjG27-upue9RF92GWvcGZP-Fm5aLSHAs5_L4LwJ06BUAnHEPGUzis20xsCu6t/exec", {
                        method: "POST",
                        headers: { "Content-Type": "application/x-www-form-urlencoded" },
                        body: new URLSearchParams({
                            data: base64Data,
                            mimetype: file.type,
                            filename: file.name
                        })
                    });
                    
                    if (response.ok) {
                        successCount++;
                    } else {
                        console.error("Failed to upload", file.name);
                    }
                } catch (error) {
                    console.error("Upload error for", file.name, error);
                }
            }
            
            status.textContent = `🎉 完成！成功上傳檔案。`;
            uploadBtn.disabled = false;
            fileInput.value = "";
        }

        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });
        }
    </script>
</body>
</html>
